# Single-origin front for BreakFit: serves the built PWA and proxies the API,
# so the browser only ever talks to one origin (no CORS) — ideal behind one
# HTTPS tunnel for iPhone PWA testing.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API + infra endpoints -> api service (path is preserved: no trailing slash on proxy_pass)
  location /v1/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /health  { proxy_pass http://api:8080/health; }
  location = /metrics { proxy_pass http://api:8080/metrics; }

  # PWA assets + SPA fallback (existing files served directly; unknown -> index.html)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
