# BreakFit backend stack: Postgres + Redis + API.
# Usage:
#   docker compose up -d --build
# The api container applies pending migrations (server/migrations/*.sql) on
# start, so no manual schema step is needed.
#
# Then in the frontend set cloudEnabled: true + apiBase, and `npm run build`.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: breakfit
      POSTGRES_PASSWORD: breakfit
      POSTGRES_DB: breakfit
    ports: ["5432:5432"]
    volumes:
      - "bf_pgdata:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breakfit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["bf_redisdata:/data"]

  api:
    build: ./server
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgres://breakfit:breakfit@db:5432/breakfit
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-BreakFit <login@breakfit.app>}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:feedback@breakfit.app}
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      # node is always present (no curl in alpine); /health returns 503 when degraded
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Single-origin front: serves the built PWA and proxies /v1 (+ /health, /metrics)
  # to the api service. Run `npm run build` first so dist/ exists. Open
  # http://localhost:4200 on desktop, or expose this port via one HTTPS tunnel
  # for iPhone PWA testing (see TESTING-IOS.md).
  web:
    image: nginx:alpine
    depends_on:
      api:
        condition: service_started
    ports: ["4200:80"]
    volumes:
      - "./dist/breakfit/browser:/usr/share/nginx/html:ro"
      - "./deploy/nginx/web.conf:/etc/nginx/conf.d/default.conf:ro"

volumes:
  bf_pgdata:
  bf_redisdata:
