name: CI

on:
  push:
    branches: [main]
  pull_request:

# Node is pinned to the version the project is known to build/test on (Node 24
# is currently incompatible with the Vitest version here). Keep in sync with
# .nvmrc and the "engines" field.
env:
  NODE_VERSION: '22.22.3'

jobs:
  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Audits read the committed package-lock.json — no install needed.
      # Hard gate on CRITICAL; HIGH-and-below reported but non-blocking.
      - name: "Audit frontend (gate: critical)"
        run: npm audit --audit-level=critical
      - name: "Audit frontend (report: high)"
        run: npm audit --audit-level=high || true
      - name: "Audit backend (gate: high)"
        run: npm audit --audit-level=high
        working-directory: server
      - name: "Audit backend (report: moderate)"
        run: npm audit --audit-level=moderate || true
        working-directory: server

  frontend:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --watch=false
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - run: npm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: breakfit
          POSTGRES_PASSWORD: breakfit
          POSTGRES_DB: breakfit
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U breakfit"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      # Verify the migration runner applies cleanly against a real Postgres.
      - name: Apply migrations
        run: node dist/migrate.js
        env:
          DATABASE_URL: postgres://breakfit:breakfit@localhost:5432/breakfit
