# BreakFit backend stack: Postgres + Redis + API.
# Usage:
#   docker compose up -d
#   docker compose exec api npm run migrate   # applies db/schema.sql
#
# Then in the frontend set cloudEnabled: true + apiBase, and `npm run build`.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: breakfit
      POSTGRES_PASSWORD: breakfit
      POSTGRES_DB: breakfit
    ports: ["5432:5432"]
    volumes:
      - "bf_pgdata:/var/lib/postgresql/data"
      # schema is applied automatically the first time the data dir is empty
      - "./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breakfit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["bf_redisdata:/data"]

  api:
    build: ./server
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgres://breakfit:breakfit@db:5432/breakfit
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-BreakFit <login@breakfit.app>}
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  bf_pgdata:
  bf_redisdata:
