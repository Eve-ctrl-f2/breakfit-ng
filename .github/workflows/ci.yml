name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Hard gate on CRITICAL (rare, always actionable); HIGH-and-below are
      # reported for visibility but don't block — Dependabot opens fix PRs.
      - name: Install (frontend)
        run: npm install --package-lock-only
      - name: "Audit frontend (gate: critical)"
        run: npm audit --audit-level=critical
      - name: "Audit frontend (report: high)"
        run: npm audit --audit-level=high || true
      - name: Install (backend)
        run: npm install --package-lock-only
        working-directory: server
      - name: "Audit backend (gate: high)"
        run: npm audit --audit-level=high
        working-directory: server
      - name: "Audit backend (report: moderate)"
        run: npm audit --audit-level=moderate || true
        working-directory: server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint --if-present
      - run: npm test -- --run
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: breakfit
          POSTGRES_PASSWORD: breakfit
          POSTGRES_DB: breakfit
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U breakfit"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Apply schema
        run: psql "$DATABASE_URL" -f ../db/schema.sql
        env:
          DATABASE_URL: postgres://breakfit:breakfit@localhost:5432/breakfit
      - run: npm run build
